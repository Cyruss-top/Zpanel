name: Sync to Gitee

# GitHub 推送代码/标签后，自动同步到 Gitee 国内镜像
# 配置说明见 docs/GITEE-SYNC.md

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [[ -z "$GITEE_TOKEN" ]]; then
            echo "跳过：未配置 GITEE_TOKEN Secret"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/Ressss2023/Zpanel.git"
          git push gitee HEAD:main --force
          git push gitee --tags --force
